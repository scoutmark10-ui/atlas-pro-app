<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Pro - Metas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-brand">
            <img src="assets/images/logo.png" alt="Atlas Pro" class="logo" onerror="this.src='https://via.placeholder.com/32x32/00d4ff/000000?text=AP'">
            <span>Atlas Pro</span>
        </div>
        <div class="nav-menu">
            <a href="index.html"><i class="fas fa-home"></i> <span class="hide-mobile">Dashboard</span></a>
            <a href="metrics.html"><i class="fas fa-chart-bar"></i> <span class="hide-mobile">Métricas</span></a>
            <a href="goals.html" class="active"><i class="fas fa-bullseye"></i> <span class="hide-mobile">Metas</span></a>
            <a href="settings.html"><i class="fas fa-cog"></i> <span class="hide-mobile">Config</span></a>
        </div>
        <div class="nav-user">
            <span id="userName" class="hide-mobile">Visitante</span>
            <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <div class="container">
        <h1><i class="fas fa-bullseye"></i> Metas e Progresso</h1>

        <div class="goals-grid" id="goalsGrid">
            <div class="loading">Carregando metas...</div>
        </div>

        <div class="add-goal-form">
            <h3><i class="fas fa-plus-circle"></i> Adicionar Nova Meta</h3>
            <div class="form-control">
                <input type="text" id="newGoalName" placeholder="Nome da Meta" autocomplete="off">
                <input type="number" id="newGoalTarget" placeholder="Meta (ex: 100)" min="1" step="1">
                <input type="date" id="newGoalDeadline">
                <button class="add-btn" onclick="addGoal()">
                    <i class="fas fa-plus"></i> Adicionar Meta
                </button>
            </div>
        </div>
    </div>

    <div class="theme-toggle">
        <i class="fas fa-moon"></i>
        <span class="hide-mobile">Modo Escuro</span>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
