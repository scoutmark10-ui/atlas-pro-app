<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Pro - Configurações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-brand">
            <img src="assets/images/logo.png" alt="Atlas Pro" class="logo" onerror="this.src='https://via.placeholder.com/32x32/00d4ff/000000?text=AP'">
            <span>Atlas Pro</span>
        </div>
        <div class="nav-menu">
            <a href="index.html"><i class="fas fa-home"></i> <span class="hide-mobile">Dashboard</span></a>
            <a href="metrics.html"><i class="fas fa-chart-bar"></i> <span class="hide-mobile">Métricas</span></a>
            <a href="goals.html"><i class="fas fa-bullseye"></i> <span class="hide-mobile">Metas</span></a>
            <a href="settings.html" class="active"><i class="fas fa-cog"></i> <span class="hide-mobile">Config</span></a>
        </div>
        <div class="nav-user">
            <span id="userName" class="hide-mobile">Visitante</span>
            <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <div class="container">
        <h1><i class="fas fa-cog"></i> Configurações</h1>

        <div class="settings-grid">
            <!-- Tema -->
            <div class="settings-card">
                <h3><i class="fas fa-palette"></i> Aparência</h3>
                <div class="setting-item">
                    <label>Tema:</label>
                    <div class="theme-selector">
                        <button class="theme-option dark active" onclick="setTheme('dark')">
                            <i class="fas fa-moon"></i> Escuro
                        </button>
                        <button class="theme-option light" onclick="setTheme('light')">
                            <i class="fas fa-sun"></i> Claro
                        </button>
                    </div>
                </div>
            </div>

            <!-- Notificações -->
            <div class="settings-card">
                <h3><i class="fas fa-bell"></i> Notificações</h3>
                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="notifGoals" checked>
                        <span>Metas atingidas</span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="notifProgress" checked>
                        <span>Progresso diário</span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="notifReminders" checked>
                        <span>Lembretes</span>
                    </label>
                </div>
                <button class="settings-btn" onclick="saveSettings()">
                    <i class="fas fa-save"></i> Salvar Preferências
                </button>
            </div>

            <!-- Dados -->
            <div class="settings-card">
                <h3><i class="fas fa-database"></i> Gerenciar Dados</h3>
                <button class="danger-btn" onclick="exportData()">
                    <i class="fas fa-download"></i> Exportar Backup
                </button>
                <button class="danger-btn" onclick="importData()">
                    <i class="fas fa-upload"></i> Importar Backup
                </button>
                <button class="danger-btn warning" onclick="resetData()">
                    <i class="fas fa-undo"></i> Restaurar Padrão
                </button>
                <button class="danger-btn" onclick="clearData()">
                    <i class="fas fa-trash"></i> Limpar Todos os Dados
                </button>
            </div>

            <!-- Conta -->
            <div class="settings-card">
                <h3><i class="fas fa-user"></i> Conta</h3>
                <div class="user-info" id="userInfo">
                    <p><i class="fas fa-user-circle"></i> <span id="userEmail">Carregando...</span></p>
                </div>
                <button class="danger-btn" onclick="changePassword()">
                    <i class="fas fa-key"></i> Alterar Senha
                </button>
                <button class="danger-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sair da Conta
                </button>
                <button class="danger-btn" onclick="deleteAccount()">
                    <i class="fas fa-user-slash"></i> Deletar Conta
                </button>
            </div>

            <!-- Botão de atualização manual -->
<div class="settings-card">
    <h3><i class="fas fa-sync-alt"></i> Atualizações</h3>
    <div class="setting-item">
        <p>Versão atual: <strong id="currentVersion">1.0.0</strong></p>
        <p>Última verificação: <span id="lastCheck">-</span></p>
    </div>
    <button class="settings-btn" onclick="checkForUpdates()">
        <i class="fas fa-search"></i> Verificar Agora
    </button>
    <button class="settings-btn" onclick="window.location.href='whatsnew.html'">
        <i class="fas fa-history"></i> Histórico de Versões
    </button>
</div>
        </div>
    </div>

    <div class="theme-toggle">
        <i class="fas fa-moon"></i>
        <span class="hide-mobile">Modo Escuro</span>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
