<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Atlas Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #764ba2;
            font-weight: bold;
            font-size: 24px;
        }
        
        h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .metrics {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .metric-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .metric-value {
            font-weight: bold;
            color: #ffd700;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            color: white;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        
        .footer {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            font-size: 10px;
            text-align: center;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">A</div>
        <h2>Atlas Pro</h2>
        <div class="subtitle">Painel Rápido</div>
    </div>
    
    <div class="metrics">
        <div class="metric-item">
            <span>📊 Metas concluídas</span>
            <span class="metric-value">8/12</span>
        </div>
        <div class="metric-item">
            <span>📈 Progresso hoje</span>
            <span class="metric-value">75%</span>
        </div>
        <div class="metric-item">
            <span>⏱️ Tempo focado</span>
            <span class="metric-value">4.5h</span>
        </div>
    </div>
    
    <div class="quick-actions">
        <div class="action-btn" onclick="window.open('/', '_blank')">
            📋 Dashboard
        </div>
        <div class="action-btn" onclick="window.open('/metrics.html', '_blank')">
            📊 Métricas
        </div>
        <div class="action-btn" onclick="window.open('/goals.html', '_blank')">
            🎯 Objetivos
        </div>
        <div class="action-btn" onclick="window.open('/settings.html', '_blank')">
            ⚙️ Config
        </div>
    </div>
    
    <div class="footer">
        v1.0.0 | Clique para abrir no app principal
    </div>
</body>
</html>
