<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Pro - Métricas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-brand">
            <img src="assets/images/logo.png" alt="Atlas Pro" class="logo" onerror="this.src='https://via.placeholder.com/32x32/00d4ff/000000?text=AP'">
            <span>Atlas Pro</span>
        </div>
        <div class="nav-menu">
            <a href="index.html"><i class="fas fa-home"></i> <span class="hide-mobile">Dashboard</span></a>
            <a href="metrics.html" class="active"><i class="fas fa-chart-bar"></i> <span class="hide-mobile">Métricas</span></a>
            <a href="goals.html"><i class="fas fa-bullseye"></i> <span class="hide-mobile">Metas</span></a>
            <a href="settings.html"><i class="fas fa-cog"></i> <span class="hide-mobile">Config</span></a>
        </div>
        <div class="nav-user">
            <span id="userName" class="hide-mobile">Visitante</span>
            <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <div class="container">
        <h1><i class="fas fa-chart-pie"></i> Métricas Detalhadas</h1>

        <div class="metrics-table-container">
            <table class="metrics-table">
                <thead>
                    <tr>
                        <th>Métrica</th>
                        <th>Valor</th>
                        <th>Meta</th>
                        <th>Progresso</th>
                        <th>Última Atualização</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="metricsTableBody">
                    <tr>
                        <td colspan="6" class="loading">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="history-chart-container">
            <h3><i class="fas fa-history"></i> Histórico de Evolução</h3>
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <div class="theme-toggle">
        <i class="fas fa-moon"></i>
        <span class="hide-mobile">Modo Escuro</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
